<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Crisp, instrument-like corners — nothing too soft" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-sans);}
  .wrap{padding:24px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:78px;height:60px;background:var(--brand-50);border:1.5px solid var(--brand-300);}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-strong);}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style>
</head>
<body>
<div class="wrap" id="r"></div>
<script>
  const cs=getComputedStyle(document.documentElement);
  const items=[["xs","--radius-xs"],["sm","--radius-sm"],["md","--radius-md"],["lg","--radius-lg"],["xl","--radius-xl"],["2xl","--radius-2xl"],["pill","--radius-pill"]];
  const r=document.getElementById('r');
  items.forEach(([n,vn])=>{
    const v=cs.getPropertyValue(vn).trim();
    const disp = n==="pill" ? "999" : v;
    r.insertAdjacentHTML('beforeend',
      `<div class="item"><div class="box" style="border-radius:${v}"></div><span class="tag">${n}</span><span class="px">${disp}</span></div>`);
  });
</script>
</body>
</html>
