<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Headings & the brand voice; tight tracking, semibold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-card);}
  .wrap{padding:24px;font-family:var(--font-display);color:var(--text-strong);}
  .line{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-subtle);}
  .line:last-child{border-bottom:none;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);width:120px;flex:0 0 auto;}
  .s{font-weight:600;letter-spacing:-0.02em;line-height:1.05;white-space:nowrap;}
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="tag">5xl · 58 / 700</span><span class="s" style="font-size:58px;font-weight:700">Measure faster</span></div>
  <div class="line"><span class="tag">3xl · 36 / 600</span><span class="s" style="font-size:36px">Planting Plan L-2</span></div>
  <div class="line"><span class="tag">2xl · 28 / 600</span><span class="s" style="font-size:28px">Estimate summary</span></div>
  <div class="line"><span class="tag">xl · 22 / 600</span><span class="s" style="font-size:22px">Rear lawn measurements</span></div>
</div>
</body>
</html>
