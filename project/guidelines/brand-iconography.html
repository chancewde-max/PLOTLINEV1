<!-- @dsCard group="Brand" viewport="700x180" name="Iconography — Lucide" subtitle="2px stroke, 24px grid, round caps; substituted via Lucide CDN" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-body);}
  .wrap{padding:24px;}
  .grid{display:flex;gap:18px;flex-wrap:wrap;color:var(--text-strong);}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px;width:70px;}
  .ic .g{width:26px;height:26px;display:inline-flex;color:var(--text-body);}
  .ic .n{font-family:var(--font-mono);font-size:9px;color:var(--text-subtle);}
  .note{font-size:12px;color:var(--text-muted);margin:0 0 16px;}
</style>
</head>
<body>
<div class="wrap">
  <p class="note">Plotline uses <b>Lucide</b> at 2px stroke. Tool icons: a measurement metaphor per tool.</p>
  <div class="grid" id="g"></div>
</div>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../assets/icons.js"></script>
<script>
  const names=["hand","square-dashed","spline","locate","box","ruler","layers","map","scaling","message-square","share-2","file-down"];
  const g=document.getElementById('g');
  names.forEach(n=>{
    const wrap=document.createElement('div'); wrap.className='ic';
    const ic=document.createElement('span'); ic.className='g';
    const svg=window.plIconSVG(n,{size:26}); if(svg) ic.appendChild(svg);
    const lab=document.createElement('span'); lab.className='n'; lab.textContent=n;
    wrap.appendChild(ic); wrap.appendChild(lab); g.appendChild(wrap);
  });
</script>
</body>
</html>
