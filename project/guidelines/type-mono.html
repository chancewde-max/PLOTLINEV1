<!-- @dsCard group="Type" viewport="700x190" name="Mono — JetBrains Mono" subtitle="Measurements, quantities, units & codes — tabular figures" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--surface-card);color:var(--text-strong);}
  .wrap{padding:24px;font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
  .big{font-size:40px;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:baseline;gap:8px;}
  .unit{font-size:16px;color:var(--text-muted);font-weight:500;}
  .row{display:flex;gap:28px;margin-top:18px;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;gap:4px;}
  .v{font-size:22px;font-weight:600;}
  .k{font-family:var(--font-sans);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);}
  .code{font-size:13px;color:var(--text-muted);margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="big">12,480<span class="unit">sq ft</span></div>
  <div class="row">
    <div class="stat"><span class="v" style="color:var(--takeoff-linear)">840 ln ft</span><span class="k">Edging</span></div>
    <div class="stat"><span class="v" style="color:var(--takeoff-count)">14 ea</span><span class="k">Trees</span></div>
    <div class="stat"><span class="v" style="color:var(--takeoff-volume)">38 cu yd</span><span class="k">Mulch</span></div>
    <div class="stat"><span class="v" style="color:var(--text-brand)">$48,210</span><span class="k">Total</span></div>
  </div>
  <div class="code">L-2 · 1" = 20' · scale set · 0123456789</div>
</div>
</body>
</html>
