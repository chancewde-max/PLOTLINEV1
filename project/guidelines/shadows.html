<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Subtle, cool-tinted shadows — xs through xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);}
  .wrap{padding:30px 24px;display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:10px;border:1px solid var(--border-subtle);}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--text-body);}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="tag">shadow-xs</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="tag">shadow-sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="tag">shadow-md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="tag">shadow-lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="tag">shadow-xl</span></div>
</div>
</body>
</html>
