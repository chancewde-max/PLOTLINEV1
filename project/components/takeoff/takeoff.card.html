<!-- @dsCard group="Components" viewport="700x400" name="Takeoff Primitives" subtitle="Tool rail, measurement chips, sheet tiles & estimate rows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);color:var(--text-body);}
  .wrap{padding:24px;display:grid;grid-template-columns:auto 260px 1fr;gap:24px;align-items:start;}
  .col-h{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);margin:0 0 10px;}
  .estimate{background:var(--surface-card);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../assets/icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { ToolRail, MeasurementChip, SheetThumb, EstimateRow } = window.PlotlineDesignSystem_0cdb69;
function ic(name){ const n = window.plIconSVG(name,{size:20}); return n ? <span dangerouslySetInnerHTML={{__html:n.outerHTML}} style={{display:"inline-flex"}}/> : null; }

function Demo(){
  const [tool,setTool]=React.useState("area");
  const [sel,setSel]=React.useState("a1");
  const tools=[
    {id:"pan",label:"Pan",icon:ic("hand"),shortcut:"H"},
    {id:"area",label:"Area",icon:ic("square-dashed"),shortcut:"A"},
    {id:"linear",label:"Linear",icon:ic("spline"),shortcut:"L"},
    {id:"count",label:"Count",icon:ic("locate"),shortcut:"C"},
    {id:"volume",label:"Volume",icon:ic("box"),shortcut:"V"},
    "divider",
    {id:"note",label:"Note",icon:ic("message-square"),shortcut:"N"},
  ];
  return (
    <React.Fragment>
      <div>
        <p className="col-h">Tool rail</p>
        <ToolRail tools={tools} value={tool} onChange={setTool} />
      </div>
      <div>
        <p className="col-h">Measurements</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <MeasurementChip type="area" label="Sod — rear lawn" value="4,820" unit="sq ft" selected={sel==="a1"} onClick={()=>setSel("a1")} />
          <MeasurementChip type="linear" label="Steel edging" value="312" unit="ln ft" selected={sel==="l1"} onClick={()=>setSel("l1")} />
          <MeasurementChip type="count" label="Shade trees" value="14" unit="ea" selected={sel==="c1"} onClick={()=>setSel("c1")} />
          <MeasurementChip type="volume" label="Mulch 3″" value="38" unit="cu yd" selected={sel==="v1"} onClick={()=>setSel("v1")} />
        </div>
        <p className="col-h" style={{marginTop:18}}>Sheets</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <SheetThumb code="L-1" name="Site Plan" scale={'1"=30\\''} count={8} />
          <SheetThumb code="L-2" name="Planting" scale={'1"=20\\''} count={12} selected />
        </div>
      </div>
      <div>
        <p className="col-h">Estimate</p>
        <div className="estimate">
          <EstimateRow header />
          <EstimateRow type="area" name="Sod & turf" source="L-2 · 3 areas" quantity="12,480" unit="sq ft" unitPrice="$0.85 / sq ft" total="$10,608" />
          <EstimateRow type="linear" name="Steel edging" source="L-2 · 5 runs" quantity="840" unit="ln ft" unitPrice="$6.20 / ln ft" total="$5,208" />
          <EstimateRow type="count" name="Shade trees" source="L-2 · 14 pts" quantity="14" unit="ea" unitPrice="$420 / ea" total="$5,880" />
          <EstimateRow type="volume" name="Mulch, 3″ depth" source="L-2 · 4 beds" quantity="38" unit="cu yd" unitPrice="$52 / cu yd" total="$1,976" />
          <EstimateRow isTotal name="Estimated total" total="$48,210" />
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
