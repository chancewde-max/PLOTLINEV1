<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);color:var(--text-body);}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:20px;}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);min-width:74px;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Badge, Tag, Avatar } = window.PlotlineDesignSystem_0cdb69;
function Demo(){
  return (
    <React.Fragment>
      <div className="row"><span className="label">Badges</span>
        <Badge variant="success" dot>Synced</Badge>
        <Badge variant="warning">Draft</Badge>
        <Badge variant="danger" dot>Conflict</Badge>
        <Badge variant="brand">Pro</Badge>
        <Badge variant="info">v3</Badge>
        <Badge variant="neutral">Archived</Badge>
        <Badge variant="solid">12</Badge>
      </div>
      <div className="row"><span className="label">Tags</span>
        <Tag color="area" tinted>Sod — rear lawn</Tag>
        <Tag color="linear" tinted>Steel edging</Tag>
        <Tag color="count" tinted>Trees</Tag>
        <Tag color="volume" tinted>Mulch 3″</Tag>
        <Tag color="region">Hardscape</Tag>
        <Tag color="slope" onRemove={()=>{}}>Grading</Tag>
      </div>
      <div className="row"><span className="label">Avatars</span>
        <Avatar name="Amy Reyes" status="online" />
        <Avatar name="Jordan Tate" size="lg" status="busy" />
        <Avatar name="Plotline Crew" size="xl" />
        <div style={{display:"flex"}}>
          <Avatar name="A B" ring />
          <Avatar name="C D" ring style={{marginLeft:-10}} />
          <Avatar name="E F" ring style={{marginLeft:-10}} />
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
